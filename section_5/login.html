<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login page</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #1a1a1a;
        padding: 0;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: #d5d4d4;
        border-radius: 8px;
        width: 300px;
        border-radius: 10px;
        border: 10px #d5d4d4 solid;
      }
      h2 {
        color: #3147d9;
        margin-bottom: 20px;
        text-align: center;
      }
      form {
        display: flex;
        flex-direction: column;
      }
      input {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid black;
        margin-bottom: 15px;
        background-color: #d5d4d4;
      }
      button {
        color: #fff;
        background-color: #355dcd;
        padding: 10px;
        border-radius: 10px;
        border: 0;
      }
      button:hover {
        background-color: #0c25df;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Login</h2>
      <form>
        <input type="email" name="" id="" placeholder="email" />
        <input type="password" name="" id="" placeholder="password" />
        <button type="submit">login</button>
      </form>
    </div>
  </body>
</html>
