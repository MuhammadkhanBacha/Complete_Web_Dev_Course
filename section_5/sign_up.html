<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up page</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #1a1a1a;
        padding: 0;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background-color: #fafafa;
        width: 400px;
        height: 280px;
        border-radius: 10px;
        /* display: flex;
        flex-direction: column; */
      }
      h2 {
        color: #2067d2;
        text-align: center;
      }
      input {
        border: 1px black solid;
        border-radius: 4px;
        margin-bottom: 10px;
        border: 1px black solid;
      }
      button {
        background-color: #8be61c;
        color: white;
        border-radius: 4px;
        border: 0;
        padding: 4px;
        width: 100px;
        height: 30px;
      }
      button:hover {
        background-color: #7fd71b;
      }
      .email {
        padding: 10px;
        width: 330px;
        height: 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 25px;
        margin-bottom: 10px;
      }
      .text-first-name {
        padding: 10px;
        width: 150px;
        height: 20px;
        gap: 10px;
      }
      .text-last-name {
        padding: 10px;
        width: 150px;
        height: 20px;
      }
      .password {
        padding: 10px;
        margin: 10px;
      }
      .name-fields {
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      .password-field {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .button-field {
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Sign up</h2>
      <form>
        <input class="email" name="" id="" placeholder="Email" />
        <div class="name-fields">
          <input class="text-first-name" placeholder="First name" />
          <input class="text-last-name" placeholder="Last name" />
        </div>
        <div class="password-field">
          <input class="password" name="" id="" placeholder="Password" />
        </div>
        <div class="button-field">
          <button type="submit">Sign up</button>
        </div>
      </form>
    </div>
  </body>
</html>
