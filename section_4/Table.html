<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>DOB</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Muhammad</td>
          <td>20</td>
          <td>17/april/2005</td>
        </tr>
        <tr>
          <td>Ali</td>
          <td>26</td>
          <td>1/jan/2000</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th>------------</th>
          <th>------------</th>
          <th>------------</th>
          <td>This is table footer</td>
          <th></th>
        </tr>
      </tfoot>
    </table>
    <hr />
    <table>
      <caption>
        <tr>
          This is another table with mix data. (Writing this in caption under
          the table tag.)
        </tr>
      </caption>
      <head>
        <tr>
          <th>Class</th>
          <th>Students</th>
          <th>Avg Marks</th>
        </tr>
      </head>
      <tbody>
        <tr>
          <td>10th</td>
          <td>50</td>
          <td>89%</td>
        </tr>
        <tr>
          <td>7</td>
          <td>30</td>
          <td>70%</td>
        </tr>
        <tr>
          <td>-</td>
          <td>-</td>
          <td>-</td>
        </tr>
        <tr>
          <td>5th</td>
          <td>10</td>
          <td>100%</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
